<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalHub | Discover Local Businesses</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header>
            <div class="logo">
                <span class="logo-icon">🏪</span>
                <span class="logo-text">Local<span>Hub</span></span>
            </div>
            <div class="header-buttons">
                <button id="adminToggleBtn" class="admin-toggle">📋 Admin Panel</button>
            </div>
        </header>

        <!-- Hero Section -->
        <section class="hero">
            <h1>Discover local <span>gems</span> near you</h1>
            <p>Find trusted restaurants, shops, healthcare & more — all in one place</p>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search businesses...">
                <button id="searchBtn">🔍 Search</button>
            </div>
        </section>

        <!-- Category Filters -->
        <div class="categories">
            <button class="category-btn active" data-category="all">All</button>
            <button class="category-btn" data-category="restaurant">🍕 Restaurants</button>
            <button class="category-btn" data-category="shop">🛍️ Shops</button>
            <button class="category-btn" data-category="healthcare">🏥 Healthcare</button>
            <button class="category-btn" data-category="education">📚 Education</button>
        </div>

        <!-- Main Content: Business Grid + Admin Panel -->
        <div class="main-layout">
            <!-- Business Grid -->
            <div class="business-grid" id="businessGrid">
                <!-- Cards will appear here -->
            </div>

            <!-- Admin Panel (hidden by default) -->
            <div class="admin-panel hidden" id="adminPanel">
                <h2>✨ Admin Dashboard</h2>
                <p class="admin-sub">Add or manage business listings</p>
                
                <div class="admin-form">
                    <h3>Add New Business</h3>
                    <input type="text" id="businessName" placeholder="Business Name">
                    <input type="text" id="businessCategory" placeholder="Category (restaurant/shop/healthcare/education)">
                    <input type="text" id="businessAddress" placeholder="Address">
                    <input type="text" id="businessPhone" placeholder="Phone Number">
                    <input type="text" id="businessHours" placeholder="Hours (e.g., 9AM-9PM)">
                    <textarea id="businessDesc" rows="2" placeholder="Short description..."></textarea>
                    <button id="addBusinessBtn" class="add-btn">+ Add Business</button>
                </div>

                <div class="admin-list">
                    <h3>Manage Existing</h3>
                    <div id="adminBusinessList"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal for business details -->
    <div id="detailModal" class="modal hidden">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
